<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VARDAN.ai Admin Login</title><link rel="stylesheet" href="styles.css"><style>body{display:grid;place-items:center;min-height:100vh}.login{width:min(390px,calc(100% - 30px));background:#fff;border:1px solid #e8ecee;border-radius:16px;padding:32px;box-shadow:0 14px 35px #18313a18}.login h1{margin:12px 0 5px}.login label{display:block;font-size:12px;margin:17px 0 6px}.login input{width:100%}.login button{width:100%;margin-top:20px}.login .error{color:#c94e4e;font-size:12px;margin-top:12px;min-height:16px}.login .mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:#3bc7a1;color:#fff;font:800 21px Manrope}</style></head><body><main class="login"><div class="mark">V</div><h1>Welcome back</h1><p>Sign in to manage your hospital.</p><form id="loginForm"><label>Email<input id="email" type="email" required autocomplete="email"></label><label>Password<input id="password" type="password" required autocomplete="current-password"></label><button class="primary">Sign in</button><div id="error" class="error"></div></form></main><script src="login.js"></script></body></html>
